<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RealMRR Mock</title>
  </head>
  <body class="bg-midnight">
    <div id="root"></div>
    <script type="module">
      import("/src/main.jsx").catch((error) => {
        const root = document.getElementById("root");
        if (!root) return;

        root.innerHTML = `
          <main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#0b0f1a;color:#e5e7eb;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
            <section style="max-width:860px;border:1px solid #2a334a;background:#131a2a;border-radius:14px;padding:20px;line-height:1.6;">
              <h1 style="margin:0 0 8px;font-size:22px;">This app must run with Vite</h1>
              <p style="margin:0 0 10px;">You are serving raw JSX from <code>/src/main.jsx</code>, so the browser cannot render the React app directly.</p>
              <p style="margin:0 0 8px;"><strong>Stop:</strong> VS Code <code>Go Live</code> / Live Server on port <code>5500</code>.</p>
              <p style="margin:0;"><strong>Run:</strong> <code>npm run dev</code> and open <code>http://127.0.0.1:5500/</code>.</p>
            </section>
          </main>
        `;

        // Keep the original error visible in DevTools for debugging.
        console.error("Failed to load /src/main.jsx. Stop Live Server and start Vite with npm run dev.", error);
      });
    </script>
  </body>
</html>
